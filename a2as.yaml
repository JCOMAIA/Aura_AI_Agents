variables:
  A2A_WRAPPER_BASE_URL:
    type: env
    params:
      caller: [os.getenv]
      path: [AuraCode.a2a_wrapper.main]
  A2A_WRAPPER_HOST:
    type: env
    params:
      caller: [os.getenv]
      path: [AuraCode.a2a_wrapper.main]
  A2A_WRAPPER_PORT:
    type: env
    params:
      caller: [os.getenv]
      path: [AuraCode.a2a_wrapper.main]
  API_HOST:
    type: env
    params:
      caller: [os.getenv]
      path: [AuraCode.main_app]
  API_PORT:
    type: env
    params:
      caller: [os.getenv]
      path: [AuraCode.main_app]
  HUGGINGFACE_API_KEY:
    type: env
    params:
      caller: [os.getenv]
      path: [AuraCode.speech_tool]
  JWT_SECRET_KEY:
    type: env
    params:
      caller: [os.getenv]
      path: [AuraCode.api.routes, AuraCode.main_app]
  LOG_LEVEL:
    type: env
    params:
      caller: [os.getenv]
      path: [AuraCode.a2a_wrapper.main]
  MEMORY_BLOSSOM_PERSISTENCE_PATH:
    type: env
    params:
      caller: [os.getenv]
      path: [AuraCode.orchestrator_adk_agent]
  OPENROUTER_API_KEY:
    type: env
    params:
      caller: [os.getenv]
      path: [AuraCode.ceaf_system.Integration, AuraCode.orchestrator_adk_agent, AuraCode.main_app, AuraCode.a2a_wrapper.main]
  OR_APP_NAME:
    type: env
    params:
      caller: [os.environ, os.environ.get]
      path: [AuraCode.orchestrator_adk_agent]
  OR_SITE_URL:
    type: env
    params:
      caller: [os.environ, os.environ.get]
      path: [AuraCode.orchestrator_adk_agent, AuraCode.a2a_wrapper.main]
  TENSORART_API_KEY:
    type: env
    params:
      caller: [os.getenv]
      path: [AuraCode.tensorart_tool]

files:
  ./:
    type: pattern
    actions: [read]
    params:
      patterns: ['*.json']
      caller: [_load_agent_configs]
  .env:
    type: pattern
    actions: [read]
    params:
      caller: [os.path.join]
      pattern: [os.path.dirname(), .env]
  .json:
    type: literal
    actions: [read]
    params:
      caller: [delete_agent, _save_agent_config, unpublish_agent_template, publish_agent_to_marketplace, list_prebuilt_agents,
        get_prebuilt_agent_details, process_agent_training]
      path: [self.base_storage_path]
  adaptive_path:
    type: variable
    actions: [write, read]
    params:
      caller: [open, os.path.exists, json.load]
      alias: [f]
  agent_path:
    type: variable
    actions: [write, delete, read]
    params:
      caller: [agent_path.mkdir, shutil.rmtree, open, json.load]
  agent_storage/_shared:
    type: literal
    actions: [read]
  AGENT_STORAGE_PATH:
    type: variable
    actions: [write]
    params:
      caller: [AGENT_STORAGE_PATH.mkdir]
  aura_agents.db:
    type: literal
    actions: [read]
    params:
      path: [PROJECT_ROOT]
  aura_state.json:
    type: literal
    actions: [read]
    params:
      caller: [_load_system_state, _save_system_state]
      path: [self.persistence_path]
  avatar_dir:
    type: variable
    actions: [write]
    params:
      caller: [avatar_dir.mkdir]
  avatar_path:
    type: variable
    actions: [write]
    params:
      caller: [open]
      alias: [buffer]
  base_storage_path:
    type: variable
    actions: [read]
    params:
      caller: [Path]
  config_file:
    type: variable
    actions: [read, delete]
    params:
      caller: [open, json.load, config_file.unlink]
      alias: [f]
  config_path:
    type: variable
    actions: [delete, write]
    params:
      caller: [config_path.unlink, open]
  dotenv_path:
    type: variable
    actions: [read]
    params:
      caller: [os.path.exists]
  file_path:
    type: variable
    actions: [write]
    params:
      caller: [open]
      alias: [buffer]
  filepath:
    type: variable
    actions: [write, read]
    params:
      caller: [open, os.path.exists, json.load]
      alias: [f]
  files_dir:
    type: variable
    actions: [write, read]
    params:
      caller: [files_dir.mkdir, files_dir.iterdir]
  index.html:
    type: literal
    actions: [read]
    params:
      caller: [serve_frontend_or_api_info]
      path: [frontend_path]
  mcl_state.json:
    type: literal
    actions: [read]
    params:
      caller: [_load_system_state, _save_system_state]
      path: [self.persistence_path]
  memory_blossom.json:
    type: literal
    actions: [read]
    params:
      caller: [_create_ncf_agent, create_tensorart_specialist_agent, publish_agent_to_marketplace]
      path: [agent_path]
  memory_state.json:
    type: literal
    actions: [read]
    params:
      caller: [_create_ceaf_agent, _load_system_state, _save_system_state]
      path: [Path]
  ncim_state.json:
    type: literal
    actions: [read]
    params:
      caller: [_load_system_state, _save_system_state]
      path: [self.persistence_path]
  persistence_path:
    type: variable
    actions: [read]
    params:
      caller: [Path]
  profile:
    type: literal
    actions: [read]
    params:
      caller: [upload_agent_avatar]
      path: [avatar_dir]
  public_config_file_path:
    type: variable
    actions: [read, delete]
    params:
      caller: [open, json.load, public_config_file_path.unlink]
      alias: [f]
  public_data_path:
    type: variable
    actions: [write, delete]
    params:
      caller: [public_data_path.mkdir, shutil.rmtree]
  public_memory_path:
    type: variable
    actions: [write]
    params:
      caller: [open]
      alias: [f]
  public_path:
    type: variable
    actions: [delete]
    params:
      caller: [shutil.rmtree]
  SHARED_STORAGE_PATH:
    type: literal
    actions: [read, write]
    params:
      caller: [Path('agent_storage/_shared'), SHARED_STORAGE_PATH.mkdir]
  source_config_file_path:
    type: variable
    actions: [read]
    params:
      caller: [shutil.copy2]
  source_data_dir_path:
    type: variable
    actions: [read]
    params:
      caller: [shutil.copytree]
  upload.html:
    type: literal
    actions: [read]
    params:
      caller: [serve_upload_page]
      path: [frontend_path]
  user_dir:
    type: variable
    actions: [read]
    params:
      caller: [user_dir.glob]
  user_path:
    type: variable
    actions: [write]
    params:
      caller: [user_path.mkdir]
  vre_state.json:
    type: literal
    actions: [read]
    params:
      caller: [_load_system_state, _save_system_state]
      path: [self.persistence_path]

networks:
  api-inference.huggingface.co:
    type: api
    actions: [GET]
    urls: ['/{...}']
    protocols: [https]
    ports: ["443"]
    params:
      pattern: https://api-inference.huggingface.co/models/{model_id}
      caller: [_query_hf]
  localhost:
    type: api
    actions: [GET]
    urls: ['/{...}', /]
    protocols: [http]
    ports: ["80", "8000"]
    params:
      caller: [register_agent_a2a, register_to_aira_hub]
      pattern: http://localhost:8000/agents/{agent_id}
      links: [url]
  openrouter.ai:
    type: api
    actions: [GET]
    urls: [/api/v1]
    protocols: [https]
    ports: ["443"]
    params:
      caller: [_call_agent]
      links: [base_url]
